<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vietnam On Top</title>

<style>
body{font-family:Arial;background:#0a1f44;color:white;text-align:center;margin:0}
input,button{padding:8px;margin:5px;border-radius:5px;border:none}
button{cursor:pointer}
.teamBtn{display:block;width:90%;margin:5px auto;background:#1e3c72;color:white}
.chatBox{height:200px;overflow:auto;background:white;color:black;margin:10px}
.adminBox{background:#132d63;padding:15px;margin:10px;border-radius:10px}
.premiumBox{background:#132d63;padding:15px;margin:10px;border-radius:10px}
.backBtn{background:orange}
.buyBtn{background:red;color:white}
</style>
</head>
<body>

<h2>🇻🇳 Vietnam On Top 🇻🇳</h2>

<div id="authSection">
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Mật khẩu"><br>
<button onclick="register()">Đăng ký</button>
<button onclick="login()">Đăng nhập</button>
</div>

<div id="appSection" style="display:none">

<h3>Danh sách 20 đội</h3>
<div id="teamList"></div>

<div id="chatSection" style="display:none">
<button class="backBtn" onclick="back()">← Back</button>
<h3 id="teamTitle"></h3>
<div class="chatBox" id="chatBox"></div>
<input id="msgInput" placeholder="Nhập tin nhắn">
<button onclick="sendMsg()">Gửi</button>
</div>

<div class="premiumBox">
<h3>⭐ Premium</h3>
<p>Giá: 49.000đ / 30 ngày</p>
<p>Đặc quyền:</p>
<p>- Biểu tượng ⭐ bên cạnh tên</p>
<p>- Ưu tiên hiển thị tin nhắn</p>
<p>- Vào phòng chat VIP (sắp ra mắt)</p>
<p>- Không giới hạn số tin nhắn/ngày</p>
<button class="buyBtn">Mua Premium</button>
</div>

<div id="adminPanel" class="adminBox" style="display:none">
<h3>🛡 ADMIN PANEL</h3>
<button onclick="banUser()">BAN USER</button>
<button onclick="kickUser()">KICK USER</button>
</div>

<button onclick="logout()">Đăng xuất</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, push, onValue, set, get, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyCvKaa4S4icydrj2JYA5ch0ckGC_mT0bvc",
authDomain: "vietnamontop-77401.firebaseapp.com",
databaseURL: "https://vietnamontop-77401-default-rtdb.firebaseio.com",
projectId: "vietnamontop-77401",
storageBucket: "vietnamontop-77401.firebasestorage.app",
messagingSenderId: "89611948481",
appId: "1:89611948481:web:0106f02e15f429679d5f40"
};

const ADMIN_UID = "o4WlbBoDRbPOTvbg69juPM7Iq0s1";

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getDatabase();

let currentTeam = null;

/* ================= AUTH ================= */

window.register = () => {
createUserWithEmailAndPassword(auth,email.value,password.value)
.then(cred=>{
// 🔥 THÊM PHẦN USER SYSTEM
set(ref(db,"users/"+cred.user.uid),{
email:cred.user.email,
premium:false,
banned:false,
createdAt:Date.now()
});
})
.catch(e=>alert(e.message));
};

window.login = () => {
signInWithEmailAndPassword(auth,email.value,password.value)
.catch(e=>alert(e.message));
};

window.logout = () => signOut(auth);

onAuthStateChanged(auth,user=>{
if(user){

// 🔥 KIỂM TRA BỊ BAN
get(ref(db,"users/"+user.uid)).then(snap=>{
if(snap.exists() && snap.val().banned){
alert("Tài khoản đã bị BAN!");
signOut(auth);
return;
}
});

authSection.style.display="none";
appSection.style.display="block";

if(user.uid === ADMIN_UID){
adminPanel.style.display="block";
}

loadTeams();
}else{
authSection.style.display="block";
appSection.style.display="none";
}
});

/* ================= TEAM ================= */

function loadTeams(){
teamList.innerHTML="";
for(let i=1;i<=20;i++){
let btn=document.createElement("button");
btn.className="teamBtn";
btn.innerText="Đội "+i;
btn.onclick=()=>openTeam("team"+i);
teamList.appendChild(btn);
}
}

window.openTeam = (team)=>{
currentTeam=team;
teamList.style.display="none";
chatSection.style.display="block";
teamTitle.innerText=team;

onValue(ref(db,"messages/"+team),snap=>{
chatBox.innerHTML="";
snap.forEach(child=>{
let data=child.val();
chatBox.innerHTML += `<div>${data.email}: ${data.text}</div>`;
});
});
};

window.back=()=>{
chatSection.style.display="none";
teamList.style.display="block";
};

window.sendMsg=()=>{
push(ref(db,"messages/"+currentTeam),{
email:auth.currentUser.email,
uid:auth.currentUser.uid,
text:msgInput.value
});
msgInput.value="";
};

/* ================= ADMIN ================= */

window.banUser = ()=>{
let uid = prompt("Nhập UID người cần BAN:");
if(!uid) return;

set(ref(db,"users/"+uid+"/banned"),true);
alert("Đã BAN UID: "+uid);
};

window.kickUser = ()=>{
let uid = prompt("Nhập UID người cần KICK:");
if(!uid) return;

remove(ref(db,"users/"+uid));
alert("Đã XÓA USER: "+uid);
};

</script>

</body>
</html>
