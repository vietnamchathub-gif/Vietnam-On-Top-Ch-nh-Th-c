<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vietnam On Top</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0b3d91;
color:white;
}

header{
background:red;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:6px;
cursor:pointer;
}

.room{
background:white;
color:black;
padding:10px;
margin:5px;
border-radius:8px;
cursor:pointer;
}

#chatBox{
height:300px;
overflow:auto;
background:white;
color:black;
padding:10px;
border-radius:10px;
}

input{
padding:8px;
border-radius:5px;
border:none;
}
</style>
</head>

<body>

<header>🇻🇳 Vietnam On Top 🇻🇳</header>

<div id="loginBox">
<h3>Đăng nhập</h3>
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Mật khẩu"><br>
<button onclick="register()">Đăng ký</button>
<button onclick="loginUser()">Đăng nhập</button>
</div>

<div id="appBox" style="display:none;padding:10px;">

<h3>Chọn Đội</h3>
<div id="rooms"></div>

<div id="roomInside" style="display:none;">
<button onclick="back()">⬅ Back</button>
<h3 id="roomTitle"></h3>

<img src="https://upload.wikimedia.org/wikipedia/commons/2/21/Flag_of_Vietnam.svg" width="100%">

<div id="chatBox"></div>
<input id="msg" placeholder="Nhắn tin...">
<button onclick="send()">Gửi</button>
</div>

<hr>

<h3>Hồ sơ</h3>
<div id="profile"></div>

</div>

<script>
const firebaseConfig = {
apiKey: "AIzaSyCvKaa4S4icydrj2JYA5ch0ckGC_mT0bvc",
authDomain: "vietnamontop-77401.firebaseapp.com",
databaseURL: "https://vietnamontop-77401-default-rtdb.firebaseio.com",
projectId: "vietnamontop-77401",
storageBucket: "vietnamontop-77401.firebasestorage.app",
messagingSenderId: "89611948481",
appId: "1:89611948481:web:0106f02e15f429679d5f40"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let currentRoom = null;
let messageCount = 0;

function register(){
auth.createUserWithEmailAndPassword(
document.getElementById("email").value,
document.getElementById("password").value
).then(user=>{
db.ref("users/"+user.user.uid).set({
created:new Date().toLocaleString(),
premium:false,
banned:false
});
}).catch(e=>alert(e.message));
}

function loginUser(){
auth.signInWithEmailAndPassword(
document.getElementById("email").value,
document.getElementById("password").value
).catch(e=>alert(e.message));
}

auth.onAuthStateChanged(user=>{
if(user){

db.ref("users/"+user.uid+"/banned").once("value",snap=>{
if(snap.val()===true){
alert("Bạn đã vi phạm chính sách.");
auth.signOut();
return;
}
});

document.getElementById("loginBox").style.display="none";
document.getElementById("appBox").style.display="block";

loadProfile(user.uid);
createRooms();
}
});

function loadProfile(uid){
db.ref("users/"+uid).once("value",snap=>{
let data=snap.val();
document.getElementById("profile").innerHTML=`
Tên tài khoản: ${uid}<br>
Ngày tạo tài khoản: ${data.created}<br>
Premium: ${data.premium ? "Đã mua" : "Chưa mua"}
`;
});
}

function createRooms(){
let roomsDiv = document.getElementById("rooms");
roomsDiv.innerHTML="";
for(let i=1;i<=50;i++){
let div=document.createElement("div");
div.className="room";
div.innerText="Đội "+i;
div.onclick=()=>enterRoom("room"+i);
roomsDiv.appendChild(div);
}
}

function enterRoom(room){
currentRoom=room;

document.getElementById("roomInside").style.display="block";
document.getElementById("roomTitle").innerText="Đội "+room.replace("room","");
document.getElementById("chatBox").innerHTML="";
document.getElementById("rooms").style.display="none";

db.ref("rooms/"+room).on("child_added",snap=>{
let data=snap.val();
let chatBox=document.getElementById("chatBox");
chatBox.innerHTML+=`<div>${data.user}: ${data.text}</div>`;
chatBox.scrollTop=chatBox.scrollHeight;
});
}

function back(){
document.getElementById("roomInside").style.display="none";
document.getElementById("rooms").style.display="block";
}

function send(){
if(!currentRoom) return;

messageCount++;

if(messageCount>5){
alert("Spam detected.");
auth.signOut();
return;
}

db.ref("rooms/"+currentRoom).push({
user:auth.currentUser.uid,
text:document.getElementById("msg").value
});

document.getElementById("msg").value="";
}
</script>

</body>
</html>
