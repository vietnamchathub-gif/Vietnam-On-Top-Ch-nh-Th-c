<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vietnam On Top 🇻🇳 [BETA]</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(180deg,#0d1b2a,#1b263b,#1e3a5f);
  color:white;
}

header{
  background:red;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

nav{
  display:flex;
  justify-content:space-around;
  background:rgba(0,0,0,0.4);
  padding:10px;
}

nav button{
  background:none;
  border:none;
  color:white;
  font-size:14px;
}

.section{display:none;padding:20px;}
.active{display:block;}

.card{
  background:rgba(0,0,0,0.4);
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
}

input,select{
  width:100%;
  padding:8px;
  border-radius:6px;
  border:none;
  margin-top:5px;
}

button{
  padding:8px;
  border:none;
  border-radius:6px;
  background:red;
  color:white;
  margin-top:8px;
}
</style>
</head>

<body>

<header>Vietnam On Top 🇻🇳 [BETA]</header>

<nav>
  <button onclick="showSection('home')">🏠 Trang chủ</button>
  <button onclick="showSection('confess')">💬 Tâm sự</button>
  <button onclick="showSection('profile')">👤 Hồ sơ</button>
</nav>

<div id="home" class="section active">
  <h2>🔥 Trang Chủ</h2>
  <div class="card">Chào mừng đến hệ thống 500 đội Vietnam On Top 😎</div>
</div>

<div id="confess" class="section">
  <h2>💬 Khu vực Tâm Sự (500 Đội)</h2>

  <div class="card">
    <label>Chọn đội:</label>
    <select id="teamSelect"></select>
    <button onclick="joinTeam()">Vào đội</button>
  </div>

  <div id="chatArea" style="display:none;">
    <h3 id="teamTitle"></h3>
    <div id="chatBox"></div>
    <input id="chatInput" placeholder="Nhập tin nhắn...">
    <button onclick="sendMessage()">Gửi</button>
  </div>
</div>

<div id="profile" class="section">
  <h2>👤 Hồ sơ</h2>
  <div class="card">
    <p><b>Tên tài khoản:</b> <span id="profileName"></span></p>
    <p><b>Ngày tạo tài khoản:</b> <span id="profileDate"></span></p>
    <p><b>Premium [ĐẶC QUYỀN]:</b> <span id="profilePremium"></span></p>
  </div>
</div>

<script>
function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getDatabase, ref, push, onValue, set, get }
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCvKaa4S4icydrj2JYA5ch0ckGC_mT0bvc",
  authDomain: "vietnamontop-77401.firebaseapp.com",
  databaseURL: "https://vietnamontop-77401-default-rtdb.firebaseio.com",
  projectId: "vietnamontop-77401",
  storageBucket: "vietnamontop-77401.firebasestorage.app",
  messagingSenderId: "89611948481",
  appId: "1:89611948481:web:11116769713da2629d5f40"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ===== USER SYSTEM ===== */

let userId = localStorage.getItem("userId");

if(!userId){
  userId = "user"+Date.now();
  localStorage.setItem("userId",userId);

  let name = prompt("Nhập tên tài khoản:");
  set(ref(db,"users/"+userId),{
    name:name,
    created:new Date().toLocaleString(),
    premium:false
  });
}

/* LOAD PROFILE */
get(ref(db,"users/"+userId)).then(snapshot=>{
  const data=snapshot.val();
  document.getElementById("profileName").innerText=data.name;
  document.getElementById("profileDate").innerText=data.created;
  document.getElementById("profilePremium").innerHTML=
    data.premium?"<b style='color:gold'>Đã mua</b>":"Chưa mua";
});

/* ===== BAN CHECK ===== */

function showBan(){
  document.body.innerHTML=`
    <div style="background:black;color:red;height:100vh;display:flex;align-items:center;justify-content:center;font-size:20px;text-align:center;">
    Bạn đã vi phạm chính sách của chúng tôi.
    </div>`;
}

get(ref(db,"bannedUsers/"+userId)).then(snap=>{
  if(snap.exists()) showBan();
});

/* ===== TEAM SYSTEM ===== */

const teamSelect=document.getElementById("teamSelect");

for(let i=1;i<=500;i++){
  let opt=document.createElement("option");
  opt.value="team"+i;
  opt.text="Đội "+i;
  teamSelect.appendChild(opt);
}

let currentTeam=null;

window.joinTeam=function(){
  currentTeam=teamSelect.value;
  document.getElementById("chatArea").style.display="block";
  document.getElementById("teamTitle").innerText="Bạn đang ở "+teamSelect.options[teamSelect.selectedIndex].text;
  loadMessages();
};

/* ===== KICK SYSTEM ===== */

let messageTimes=[];

function showKick(){
  document.body.innerHTML=`
    <div style="background:black;color:orange;height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px;">
    <div>
    <b>[Data]</b><br><br>
    Hệ thống chúng tôi phát hiện lần dùng của bạn rất khả nghi có thể là đang tấn công hệ thống,
    cho nên bạn sẽ bị đá khỏi phiên sử dụng.<br><br>
    ❓ Nếu bạn muốn hỗ trợ, hãy truy cập vào kênh hỗ trợ ở trong cộng đồng ứng dụng chúng tôi,
    nhân viên hỗ trợ sẽ hỗ trợ giải đáp thắc mắc của bạn.
    </div>
    </div>`;
  setTimeout(()=>location.reload(),4000);
}

/* SEND MESSAGE */

window.sendMessage=function(){

  if(!currentTeam) return alert("Bạn chưa vào đội!");

  const now=Date.now();
  messageTimes.push(now);
  messageTimes=messageTimes.filter(t=>now-t<5000);

  if(messageTimes.length>5){
    showKick();
    return;
  }

  const input=document.getElementById("chatInput");
  if(!input.value.trim()) return;

  push(ref(db,"teams/"+currentTeam),{
    text:input.value,
    user:userId,
    time:now
  });

  input.value="";
};

/* LOAD MESSAGE */

function loadMessages(){
  const chatBox=document.getElementById("chatBox");
  onValue(ref(db,"teams/"+currentTeam),(snapshot)=>{
    chatBox.innerHTML="";
    snapshot.forEach(child=>{
      const data=child.val();
      const div=document.createElement("div");
      div.className="card";
      div.innerText=data.text;
      chatBox.appendChild(div);
    });
  });
}
</script>

</body>
</html>
