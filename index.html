<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vietnam On Top</title>

<style>
body{margin:0;font-family:Arial;background:#0b1f3a;color:white;text-align:center}
.team{background:#1e3c72;margin:8px;padding:10px;border-radius:6px;cursor:pointer}
.chat-box{margin-top:20px}
#messages{height:200px;overflow-y:auto;background:#111;padding:10px;border-radius:8px}
input,button{padding:8px;margin:5px}
.admin-panel{margin-top:30px;background:#111;padding:20px;border-radius:10px}
.premium-box{margin-top:30px;background:#111;padding:20px;border-radius:10px}
</style>
</head>

<body>

<h2>🇻🇳 Vietnam On Top 🇻🇳</h2>

<div id="teamList"></div>

<div class="chat-box" id="chatBox" style="display:none;">
  <h3 id="teamTitle"></h3>
  <div id="messages"></div>
  <input type="text" id="msgInput" placeholder="Nhập tin nhắn">
  <button onclick="sendMessage()">Gửi</button>
</div>

<div class="premium-box">
  <h3>⭐ Premium</h3>
  <p>49.000đ / 30 ngày</p>
  <p>99.000đ / 90 ngày</p>
  <p>199.000đ / 365 ngày</p>
  <button onclick="buyPremium()">Mua Premium</button>
  <div id="premiumNotice" style="display:none;border:2px solid red;color:red;padding:10px;margin-top:10px">
    Premium [ĐẶC QUYỀN] này chưa được nhà phát hành bán trên ứng dụng.
  </div>
</div>

<div class="admin-panel" id="adminPanel" style="display:none;">
  <h3>🛡 ADMIN PANEL</h3>
  <input type="text" id="targetUID" placeholder="Nhập UID">
  <br>
  <button onclick="banUser()">BAN</button>
  <button onclick="kickUser()">KICK</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, push, onValue, remove, get } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey:"AIzaSyCvKaa4S4icydrj2JYA5ch0ckGC_mT0bvc",
  authDomain:"vietnamontop-77401.firebaseapp.com",
  databaseURL:"https://vietnamontop-77401-default-rtdb.firebaseio.com",
  projectId:"vietnamontop-77401",
  appId:"1:89611948481:web:0106f02e15f429679d5f40"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const ADMIN_UID = "o4WlbBoDRbPOTvbg69juPM7Iq0s1";

let currentTeam = "";
let currentUser = null;

/* ====== TẠO 20 ĐỘI ====== */
const teamList = document.getElementById("teamList");
for(let i=1;i<=20;i++){
  const div = document.createElement("div");
  div.className="team";
  div.innerText="Đội "+i;
  div.onclick=()=>openTeam("team"+i);
  teamList.appendChild(div);
}

/* ====== LOGIN CHECK ====== */
onAuthStateChanged(auth,(user)=>{

   if(!user){
      console.log("Chưa đăng nhập");
      return;
   }

   console.log("Đăng nhập UID:", user.uid);

   currentUser = user;

   const userRef = ref(db,"users/"+user.uid);

   get(userRef).then((snap)=>{

      if(!snap.exists()){
         set(userRef,{
            email:user.email,
            premium:false,
            banned:false,
            createdAt:Date.now()
         });
      }else{
         if(snap.val().banned){
            alert("Tài khoản bị BAN");
            signOut(auth);
            return;
         }
      }

   }).catch(err=>{
      console.error("Lỗi đọc user:",err);
   });

   if(user.uid===ADMIN_UID){
      document.getElementById("adminPanel").style.display="block";
   }

});

/* ====== CHAT ====== */
function openTeam(team){
  currentTeam=team;
  document.getElementById("chatBox").style.display="block";
  document.getElementById("teamTitle").innerText="Phòng "+team;

  const msgRef = ref(db,"messages/"+team);
  onValue(msgRef,(snap)=>{
    const messagesDiv=document.getElementById("messages");
    messagesDiv.innerHTML="";
    snap.forEach(child=>{
      const p=document.createElement("p");
      p.innerText=child.val().email+": "+child.val().text;
      messagesDiv.appendChild(p);
    });
  });
}

window.sendMessage=function(){
  const text=document.getElementById("msgInput").value;
  if(!text||!currentTeam) return;
  push(ref(db,"messages/"+currentTeam),{
    email:currentUser.email,
    text:text,
    time:Date.now()
  });
  document.getElementById("msgInput").value="";
}

/* ====== PREMIUM ====== */
window.buyPremium=function(){
  document.getElementById("premiumNotice").style.display="block";
}

/* ====== ADMIN ====== */
window.banUser=function(){
  const uid=document.getElementById("targetUID").value;
  if(!uid) return alert("Nhập UID");
  set(ref(db,"users/"+uid+"/banned"),true);
  alert("Đã BAN");
}

window.kickUser=function(){
  const uid=document.getElementById("targetUID").value;
  if(!uid) return alert("Nhập UID");
  remove(ref(db,"users/"+uid));
  alert("Đã KICK");
}
</script>

</body>
</html>
