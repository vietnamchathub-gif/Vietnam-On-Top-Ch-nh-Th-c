<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vietnam On Top</title>

<style>
body{
  background:#0f2747;
  color:white;
  font-family:Arial;
  margin:0;
  text-align:center;
}

.header{
  background:#0c1f38;
  padding:15px;
  font-size:20px;
  font-weight:bold;
}

.team{
  background:#274a7d;
  margin:8px 10px;
  padding:12px;
  border-radius:6px;
}

.box{
  background:black;
  padding:20px;
  margin:20px 10px;
  border-radius:8px;
}

.admin{
  display:none;
}

input{
  padding:6px;
  margin:5px;
}

button{
  padding:6px 12px;
  margin:5px;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="header">🇻🇳 Vietnam On Top 🇻🇳</div>

<div id="userInfo">Chưa đăng nhập</div>

<!-- LOGIN / REGISTER -->
<div class="box">
  <h3>Đăng nhập / Đăng ký</h3>
  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="register()">Đăng ký</button>
  <button onclick="login()">Đăng nhập</button>
  <button onclick="loginGoogle()">Login Google</button>
  <button onclick="logout()">Đăng xuất</button>
</div>

<!-- TEAM LIST -->
<div id="teamList"></div>

<!-- PREMIUM -->
<div class="box">
  ⭐ <b>Premium</b><br><br>
  49.000đ / 30 ngày<br>
  99.000đ / 90 ngày<br>
  199.000đ / 365 ngày<br><br>
  <button>Mua Premium</button>
</div>

<!-- ADMIN PANEL -->
<div class="box admin" id="adminPanel">
  🛡 <b>ADMIN PANEL</b><br><br>
  <input type="text" id="targetUID" placeholder="Nhập ID người cần xử lí"><br>
  <button onclick="banUser()">Banned</button>
  <button onclick="kickUser()">Kick</button>
</div>

<!-- FIREBASE v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

// 🔥 CONFIG
var firebaseConfig = {
  apiKey: "AIzaSyCvKaa4S4icydrj2JYA5ch0ckGC_mT0bvc",
  authDomain: "vietnamontop-77401.firebaseapp.com",
  databaseURL: "https://vietnamontop-77401-default-rtdb.firebaseio.com",
  projectId: "vietnamontop-77401",
  storageBucket: "vietnamontop-77401.firebasestorage.app",
  messagingSenderId: "89611948481",
  appId: "1:89611948481:web:0106f02e15f429679d5f40"
};
firebase.initializeApp(firebaseConfig);

const ADMIN_UID = "o4WlbBoDRbPOTvbg69juPM7Iq0s1"; 

// Tạo team list
for(let i=1;i<=20;i++){
  document.getElementById("teamList").innerHTML +=
  `<div class="team">Đội ${i}</div>`;
}

// REGISTER
function register(){
  let email = emailInput();
  let pass = passInput();
  firebase.auth().createUserWithEmailAndPassword(email,pass)
  .then(()=>alert("Đăng ký thành công"))
  .catch(e=>alert(e.message));
}

// LOGIN
function login(){
  let email = emailInput();
  let pass = passInput();
  firebase.auth().signInWithEmailAndPassword(email,pass)
  .catch(e=>alert(e.message));
}

// GOOGLE LOGIN
function loginGoogle(){
  var provider = new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithPopup(provider);
}

// LOGOUT
function logout(){
  firebase.auth().signOut();
}

// AUTH CHECK
firebase.auth().onAuthStateChanged(function(user){
  if(user){
    document.getElementById("userInfo").innerHTML =
      "Đang đăng nhập: " + user.email + "<br>UID: " + user.uid;

    if(user.uid === ADMIN_UID){
      document.getElementById("adminPanel").style.display="block";
    } else {
      document.getElementById("adminPanel").style.display="none";
    }

  } else {
    document.getElementById("userInfo").innerHTML="Chưa đăng nhập";
    document.getElementById("adminPanel").style.display="none";
  }
});

// ADMIN FUNCTIONS
function banUser(){
  let uid = document.getElementById("targetUID").value;
  firebase.database().ref("banned/"+uid).set(true);
  alert("Đã ban");
}

function kickUser(){
  let uid = document.getElementById("targetUID").value;
  firebase.database().ref("kick/"+uid).set(Date.now());
  alert("Đã kick");
}

// helpers
function emailInput(){ return document.getElementById("email").value; }
function passInput(){ return document.getElementById("password").value; }

</script>

</body>
</html>
